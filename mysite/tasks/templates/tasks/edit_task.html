<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Редактирование задачи</title>
</head>
<body>
    <h1>Редактировать задачу: "{{ task.title }}"</h1>

    <form method="POST">
        {% csrf_token %}
        <!-- Атрибут value подставит текущее название в поле -->
        <input type="text" name="title" value="{{ task.title }}" required>

        <button type="submit">Сохранить изменения</button>
    </form>

    <br>
    <!-- Ссылка для возврата на главную -->
    <a href="{% url 'tasks' %}">Отмена</a>
</body>
</html>
